name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Swift unit tests, app smoke test, and clean bundle regression
        run: ./tests/build_regression.sh
      - name: Reject whitespace errors
        run: git diff --check
