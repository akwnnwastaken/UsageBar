name: Release candidate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-attest:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Require a verified signed annotated tag matching Info.plist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          test "$TAG_NAME" = "v${version}"
          object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" --jq '.object.type')"
          test "$object_type" = "tag"
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" --jq '.object.sha')"
          verified="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')"
          test "$verified" = "true"
      - name: Build and verify from a clean checkout
        run: ./tests/security_acceptance.sh
      - name: Create archive and SHA-256 manifest
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          archive="UsageBar-${version}-macOS-arm64.zip"
          ditto -c -k --keepParent build/UsageBar.app "$archive"
          shasum -a 256 "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Attest release candidate provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.archive.outputs.archive }}
      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: UsageBar-${{ github.ref_name }}-release-candidate
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 14
