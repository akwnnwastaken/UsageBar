name: Release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-attest:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build and verify from a clean checkout
        run: ./tests/build_regression.sh
      - name: Create archive and SHA-256 manifest
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          archive="UsageBar-${version}-macOS-arm64.zip"
          ditto -c -k --keepParent build/UsageBar.app "$archive"
          shasum -a 256 "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Attest release candidate provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.archive.outputs.archive }}
      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: UsageBar-release-candidate
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 14
